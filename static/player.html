<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Camera Player</title>
	<style>
		body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
		video { width: 100vw; height: calc(100vh - 60px); object-fit: contain; display: block; }
		.overlay { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); padding: 8px 12px; z-index: 10; }
		.overlay button { background: #fff; border: none; padding: 8px 16px; border-radius: 4px; font-weight: 600; cursor: pointer; margin-right: 8px; }
		.overlay button:hover { background: #ddd; }
		.message { color: #fff; margin-bottom: 8px; font-size: 14px; }
		.debug { color: #888; font-size: 11px; margin-top: 4px; }
		.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
		@keyframes spin { to { transform: rotate(360deg); } }
	</style>
</head>
<body>
	<video id="video" autoplay playsinline muted></video>

	<div class="overlay">
		<div class="message" id="message"><span class="spinner"></span>Connecting...</div>
		<div class="debug" id="debug"></div>
		<button onclick="window.location.href='/'">Back</button>
	</div>

	<script src="/static/mpegts.min.js"></script>
	<script>
		const video = document.getElementById('video');
		const msgEl = document.getElementById('message');
		const dbgEl = document.getElementById('debug');
		const params = new URLSearchParams(window.location.search);
		const deviceSN = params.get('deviceSN') || window.location.pathname.split('/').pop();

		const maxRetries = 10;

		let player = null;
		let statusInterval = null;
		let heartbeatWs = null;
		let heartbeatInterval = null;
		let stallCheckInterval = null;
		let retryCount = 0;

		let streamStartTime = 0;
		let lastProgressTime = 0;
		let lastDecodedFrames = 0;
		let isRecovering = false;

		let onVideoPlaying = null;
		let onVideoError = null;

		function dbg(msg) {
			dbgEl.textContent = msg;
		}

		function getRetryDelay() {
			const delay = Math.min(2000 * Math.pow(2, retryCount), 30000);
			return delay;
		}

		async function authFetch(url, options) {
			const controller = new AbortController();
			const timeout = setTimeout(() => controller.abort(), 90000);
			try {
				const resp = await fetch(url, { ...options, signal: controller.signal });
				clearTimeout(timeout);
				if (resp.status === 401) {
					window.location.reload();
					return null;
				}
				return resp;
			} catch (e) {
				clearTimeout(timeout);
				throw e;
			}
		}

		function cleanup() {
			if (stallCheckInterval) {
				clearInterval(stallCheckInterval);
				stallCheckInterval = null;
			}
			if (statusInterval) {
				clearInterval(statusInterval);
				statusInterval = null;
			}
			if (heartbeatInterval) {
				clearInterval(heartbeatInterval);
				heartbeatInterval = null;
			}
			if (heartbeatWs) {
				heartbeatWs.onclose = null;
				heartbeatWs.close();
				heartbeatWs = null;
			}
			if (player) {
				try { player.pause(); } catch(e) {}
				try { player.unload(); } catch(e) {}
				try { player.detachMediaElement(); } catch(e) {}
				try { player.destroy(); } catch(e) {}
				player = null;
			}
			if (onVideoPlaying) {
				video.removeEventListener('playing', onVideoPlaying);
				onVideoPlaying = null;
			}
			if (onVideoError) {
				video.removeEventListener('error', onVideoError);
				onVideoError = null;
			}
		}

		function initiateRecovery(reason) {
			if (isRecovering) return;
			isRecovering = true;
			retryCount++;
			console.log(`Recovery #${retryCount}: ${reason}`);
			cleanup();
			lastDecodedFrames = 0;
			lastProgressTime = 0;
			streamStartTime = 0;
			if (retryCount > maxRetries) {
				msgEl.textContent = 'Stream failed after ' + maxRetries + ' retries';
				isRecovering = false;
				return;
			}
			const delay = getRetryDelay();
			msgEl.innerHTML = `<span class="spinner"></span>Recovery #${retryCount} (${delay/1000}s)...`;
			setTimeout(() => { startStream().catch(e => console.error('startStream failed:', e)); }, delay);
		}

		function startHeartbeat() {
			const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
			heartbeatWs = new WebSocket(`${wsProto}//${location.host}/api/stream/ws/${deviceSN}`);

			heartbeatWs.onopen = () => {
				heartbeatInterval = setInterval(() => {
					if (heartbeatWs && heartbeatWs.readyState === WebSocket.OPEN) {
						heartbeatWs.send('ping');
					}
				}, 3000);
			};

			heartbeatWs.onclose = () => {
				if (heartbeatInterval) {
					clearInterval(heartbeatInterval);
					heartbeatInterval = null;
				}
			};
		}

		async function pollStatus() {
			try {
				const resp = await authFetch(`/api/stream/status/${deviceSN}`);
				if (!resp) return;
				const status = await resp.json();
				dbg(`stream=${status.active} frames=${status.framesCount} codec=${status.codec} retries=${retryCount}`);
			} catch (e) {}
		}

		async function startStream() {
			try {
				if (typeof mpegts === 'undefined') {
					msgEl.textContent = 'Error: mpegts.js failed to load';
					return;
				}

				if (!mpegts.isSupported()) {
					msgEl.textContent = 'Error: MSE not supported in this browser';
					return;
				}

				msgEl.innerHTML = '<span class="spinner"></span>Establishing P2P connection...';

				const channel = params.get('channel') || '0';
				let startResp;
				try {
					startResp = await authFetch(`/api/stream/start/${deviceSN}?channel=${channel}`, { method: 'POST' });
				} catch (e) {
					console.error('Stream start request failed:', e);
					initiateRecovery('start request failed: ' + e.message);
					return;
				}
				if (!startResp || !startResp.ok) {
					const errText = startResp ? await startResp.text() : 'Authentication required';
					msgEl.textContent = 'Failed to start stream: ' + errText;
					return;
				}

				msgEl.innerHTML = '<span class="spinner"></span>Loading video stream...';

				player = mpegts.createPlayer({
					type: 'mpegts',
					isLive: true,
					url: `/api/stream/${deviceSN}`
				}, {
					enableWorker: false,
					enableStashBuffer: false,
					autoCleanupSourceBuffer: true,
					lazyLoad: false,
					liveBufferLatencyChasing: true,
					liveBufferLatencyChasingOnPaused: true,
					autoCleanupMaxBackwardDuration: 3,
					autoCleanupMinBackwardDuration: 2
				});

				player.attachMediaElement(video);

				player.on(mpegts.Events.ERROR, (errorType, errorDetail, errorInfo) => {
					console.error('mpegts error:', errorType, errorDetail, errorInfo);
					initiateRecovery('mpegts error: ' + errorDetail);
				});

				player.on(mpegts.Events.STATISTICS_INFO, (info) => {
					const decoded = info.decodedFrames || 0;
					if (decoded > lastDecodedFrames) {
						lastDecodedFrames = decoded;
						lastProgressTime = Date.now();
					}
				});

				player.on(mpegts.Events.LOADING_COMPLETE, () => {
					msgEl.textContent = 'Stream ended';
				});

				player.load();

				onVideoPlaying = () => {
					msgEl.textContent = '';
					retryCount = 0;
					lastProgressTime = Date.now();
				};
				onVideoError = (e) => {
					console.log('Video element error:', e);
					initiateRecovery('video element error');
				};
				video.addEventListener('playing', onVideoPlaying);
				video.addEventListener('error', onVideoError);

				player.play().catch(() => {});

				isRecovering = false;
				streamStartTime = Date.now();
				lastProgressTime = 0;
				lastDecodedFrames = 0;
				msgEl.innerHTML = '<span class="spinner"></span>Buffering...';

				stallCheckInterval = setInterval(() => {
					if (!player || isRecovering) return;
					const now = Date.now();

					if (lastProgressTime === 0) {
						if (now - streamStartTime > 15000) {
							initiateRecovery('buffering timeout >15s');
						}
						return;
					}

					if (now - lastProgressTime > 10000) {
						initiateRecovery('no decode progress for 10s');
					}
				}, 3000);

				startHeartbeat();

				statusInterval = setInterval(pollStatus, 5000);
				pollStatus();
			} catch (err) {
				msgEl.textContent = 'Error: ' + err.message;
			}
		}

		startStream().catch(e => console.error('startStream failed:', e));
	</script>
</body>
</html>
