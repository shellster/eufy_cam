<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Camera Player</title>
	<style>
		body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
		video { width: 100vw; height: 100vh; object-fit: contain; }
		.overlay { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 8px; }
		.overlay button { background: #fff; border: none; padding: 8px 16px; border-radius: 4px; font-weight: 600; cursor: pointer; margin-right: 8px; }
		.overlay button:hover { background: #ddd; }
		.message { color: #fff; margin-bottom: 8px; font-size: 14px; }
		.debug { color: #888; font-size: 11px; margin-top: 4px; }
		.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
		@keyframes spin { to { transform: rotate(360deg); } }
	</style>
</head>
<body>
	<video id="video" autoplay playsinline muted></video>

	<div class="overlay">
		<div class="message" id="message"><span class="spinner"></span>Connecting...</div>
		<div class="debug" id="debug"></div>
		<button onclick="window.location.href='/'">Back</button>
	</div>

	<script src="/static/mpegts.min.js"></script>
	<script>
		const video = document.getElementById('video');
		const msgEl = document.getElementById('message');
		const dbgEl = document.getElementById('debug');
		const params = new URLSearchParams(window.location.search);
		const deviceSN = params.get('deviceSN') || window.location.pathname.split('/').pop();

		let player = null;
		let statusInterval = null;
		let heartbeatWs = null;
		let heartbeatInterval = null;
		let retryCount = 0;
		const maxRetries = 5;
		const retryDelay = 3000;

		async function authFetch(url, options) {
			const resp = await fetch(url, options);
			if (resp.status === 401) {
				window.location.reload();
				return null;
			}
			return resp;
		}

		function dbg(msg) {
			dbgEl.textContent = msg;
		}

		function cleanup() {
			if (statusInterval) {
				clearInterval(statusInterval);
				statusInterval = null;
			}
			if (heartbeatInterval) {
				clearInterval(heartbeatInterval);
				heartbeatInterval = null;
			}
			if (heartbeatWs) {
				heartbeatWs.onclose = null;
				heartbeatWs.close();
				heartbeatWs = null;
			}
			if (player) {
				try { player.pause(); } catch(e) {}
				try { player.unload(); } catch(e) {}
				try { player.detachMediaElement(); } catch(e) {}
				try { player.destroy(); } catch(e) {}
				player = null;
			}
		}

		function startHeartbeat() {
			const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
			heartbeatWs = new WebSocket(`${wsProto}//${location.host}/api/stream/ws/${deviceSN}`);

			heartbeatWs.onopen = () => {
				heartbeatInterval = setInterval(() => {
					if (heartbeatWs && heartbeatWs.readyState === WebSocket.OPEN) {
						heartbeatWs.send('ping');
					}
				}, 3000);
			};

			heartbeatWs.onclose = () => {
				if (heartbeatInterval) {
					clearInterval(heartbeatInterval);
					heartbeatInterval = null;
				}
			};
		}

		async function pollStatus() {
			try {
				const resp = await authFetch(`/api/stream/status/${deviceSN}`);
				if (!resp) return;
				const status = await resp.json();
				dbg(`stream=${status.active} frames=${status.frameCount} codec=${status.codec}`);
			} catch (e) {}
		}

		async function startStream() {
			try {
				if (typeof mpegts === 'undefined') {
					msgEl.textContent = 'Error: mpegts.js failed to load';
					return;
				}

				if (!mpegts.isSupported()) {
					msgEl.textContent = 'Error: MSE not supported in this browser';
					return;
				}

				msgEl.innerHTML = '<span class="spinner"></span>Establishing P2P connection...';

				const channel = params.get('channel') || '0';
				const startResp = await authFetch(`/api/stream/start/${deviceSN}?channel=${channel}`, { method: 'POST' });
				if (!startResp || !startResp.ok) {
					const errText = startResp ? await startResp.text() : 'Authentication required';
					msgEl.textContent = 'Failed to start stream: ' + errText;
					return;
				}

				msgEl.innerHTML = '<span class="spinner"></span>Loading video stream...';

				player = mpegts.createPlayer({
					type: 'mpegts',
					isLive: true,
					url: `/api/stream/${deviceSN}`
				}, {
					enableWorker: false,
					enableStashBuffer: false,
					autoCleanupSourceBuffer: true,
					lazyLoad: false,
					liveBufferLatencyChasing: true,
					liveBufferLatencyChasingOnPaused: true,
					autoCleanupMaxBackwardDuration: 3,
					autoCleanupMinBackwardDuration: 2
				});

				player.attachMediaElement(video);

				player.on(mpegts.Events.ERROR, (errorType, errorDetail, errorInfo) => {
					console.error('mpegts error:', errorType, errorDetail, errorInfo);
					cleanup();

					if (retryCount < maxRetries) {
						retryCount++;
						msgEl.innerHTML = `<span class="spinner"></span>Stream error, retrying (${retryCount}/${maxRetries})...`;
						setTimeout(startStream, retryDelay);
					} else {
						msgEl.textContent = 'Stream failed after ' + maxRetries + ' retries: ' + errorDetail;
					}
				});

				player.on(mpegts.Events.STATISTICS_INFO, (info) => {
					dbg(`decoded=${info.decodedFrames || 0} speed=${info.speed || 0}x`);
				});

				player.on(mpegts.Events.LOADING_COMPLETE, () => {
					msgEl.textContent = 'Stream ended';
				});

				player.load();
				video.addEventListener('playing', () => {
					msgEl.textContent = '';
					retryCount = 0;
				}, { once: true });
				player.play().catch(() => {});

				msgEl.innerHTML = '<span class="spinner"></span>Buffering...';

				startHeartbeat();

				statusInterval = setInterval(pollStatus, 2000);
				pollStatus();
			} catch (err) {
				msgEl.textContent = 'Error: ' + err.message;
			}
		}


		startStream();
	</script>
</body>
</html>
