<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Eufy Camera Login</title>
	<style>
		body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; background: #1a1a1a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
		.card { background: #2d2d2d; border-radius: 12px; padding: 40px; max-width: 420px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
		h2 { margin: 0 0 8px; font-size: 22px; }
		.subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
		.captcha-wrap { text-align: center; margin-bottom: 20px; }
		.captcha-wrap img { border: 1px solid #444; border-radius: 4px; max-width: 100%; height: 60px; }
		.captcha-actions { display: flex; gap: 8px; margin-top: 8px; justify-content: center; }
		input[type="text"] { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #444; border-radius: 8px; background: #1a1a1a; color: #fff; box-sizing: border-box; }
		input[type="text"]:focus { outline: none; border-color: #2563eb; }
		.btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
		.btn-primary { background: #2563eb; color: #fff; width: 100%; margin-top: 16px; }
		.btn-primary:hover { background: #1d4ed8; }
		.btn-primary:disabled { background: #6b7280; cursor: not-allowed; }
		.btn-secondary { background: #444; color: #fff; }
		.btn-secondary:hover { background: #555; }
		.error { color: #ef4444; background: #2d1f1f; border-radius: 8px; padding: 12px; margin-top: 16px; display: none; font-size: 14px; }
		.status { color: #4CAF50; text-align: center; margin-top: 16px; display: none; font-size: 14px; }
		.loading { display: inline-block; width: 16px; height: 16px; border: 2px solid #888; border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
		@keyframes spin { to { transform: rotate(360deg); } }
		.no-captcha { color: #888; text-align: center; padding: 20px; }
	</style>
</head>
<body>
	<div class="card">
		<h2>Eufy Security Login</h2>
		<div class="subtitle" id="captchaSubtitle" style="display:none">Captcha verification required</div>

		<div id="captchaSection" style="display:none">
			<div class="captcha-wrap">
				<img id="captchaImg" src="" alt="captcha" style="display:none"/>
				<div id="captchaLoading" class="no-captcha" style="display:none">Loading captcha...</div>
				<div class="captcha-actions">
					<button class="btn btn-secondary" onclick="refreshCaptcha()">Refresh Captcha</button>
				</div>
			</div>

			<form onsubmit="submitCaptcha(event)">
				<input type="text" id="answer" placeholder="Enter captcha answer" autocomplete="off" autofocus/>
				<button type="submit" class="btn btn-primary" id="submitBtn">Submit</button>
			</form>
		</div>

		<div id="error" class="error"></div>
		<div id="status" class="status"></div>
	</div>

	<script>
		function showError(msg) {
			const el = document.getElementById('error');
			el.textContent = msg;
			el.style.display = 'block';
		}

		function hideError() {
			document.getElementById('error').style.display = 'none';
		}

		function showStatus(msg) {
			const el = document.getElementById('status');
			el.innerHTML = msg;
			el.style.display = 'block';
		}

		async function refreshCaptcha() {
			hideError();
			try {
				const resp = await fetch('/login/refresh', { method: 'POST' });
				const data = await resp.json();
				if (data.logged_in) {
					onLoggedIn();
					return;
				}
				if (data.success) {
					await loadCaptchaImage();
				} else {
					showError(data.error || 'Failed to refresh captcha');
				}
			} catch (e) {
				showError('Failed to refresh: ' + e.message);
			}
		}

		async function loadCaptchaImage() {
			document.getElementById('captchaSubtitle').style.display = 'block';
			document.getElementById('captchaSection').style.display = 'block';
			const img = document.getElementById('captchaImg');
			const loading = document.getElementById('captchaLoading');
			try {
				const resp = await authFetch('/login/captcha/data');
				if (!resp) return;
				const data = await resp.json();
				if (!data.available) {
					loading.textContent = 'Waiting for captcha...';
					img.style.display = 'none';
					loading.style.display = 'block';
					return;
				}
				// Try embedded data first (matching old working logic)
				if (data.item) {
					img.src = data.item;
				} else if (data.captcha_base64) {
					img.src = 'data:image/png;base64,' + data.captcha_base64;
				} else if (data.captcha_img && data.captcha_img.length > 50) {
					img.src = 'data:image/png;base64,' + data.captcha_img;
				} else if (data.captcha_url) {
					img.src = data.captcha_url;
				} else {
					img.src = '/login/captcha/image?t=' + Date.now();
				}
				img.style.display = 'inline';
				loading.style.display = 'none';
			} catch (e) {
				// Fallback to fetch endpoint
				img.src = '/login/captcha/image?t=' + Date.now();
				img.style.display = 'inline';
				loading.style.display = 'none';
			}
		}

		async function submitCaptcha(e) {
			e.preventDefault();
			hideError();

			const answer = document.getElementById('answer').value;
			if (!answer) return;

			const btn = document.getElementById('submitBtn');
			btn.disabled = true;
			btn.textContent = 'Verifying...';

			try {
				const resp = await authFetch('/login/submit', {
					method: 'POST',
					headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
					body: 'answer=' + encodeURIComponent(answer)
				});
				if (!resp) return;
				const data = await resp.json();

				if (data.success) {
					onLoggedIn();
				} else {
					btn.disabled = false;
					btn.textContent = 'Submit';
					if (data.new_captcha) {
						await loadCaptchaImage();
						document.getElementById('answer').value = '';
					}
					showError(data.error || 'Login failed');
				}
			} catch (e) {
				btn.disabled = false;
				btn.textContent = 'Submit';
				showError('Request failed: ' + e.message);
			}
		}

		function onLoggedIn() {
			document.getElementById('captchaSubtitle').style.display = 'none';
			document.getElementById('captchaSection').style.display = 'none';
			showStatus('<span class="loading"></span> Login successful! Connecting to cameras...');
			pollStatus();
		}

		async function authFetch(url, options) {
			const resp = await fetch(url, options);
			if (resp.status === 401) {
				window.location.reload();
				return null;
			}
			return resp;
		}

		async function pollStatus() {
			try {
				const resp = await authFetch('/api/login/status');
				if (!resp) return;
				const status = await resp.json();
				if (status.stations_connected) {
					window.location.href = '/';
					return;
				}
			} catch (e) {}
			setTimeout(pollStatus, 2000);
		}

		// Check if already logged in on page load
		async function checkStatus() {
			try {
				const resp = await authFetch('/api/login/status');
				if (!resp) return;
				const status = await resp.json();
				if (status.logged_in) {
					onLoggedIn();
				} else if (status.captcha_needed) {
					document.getElementById('captchaSubtitle').style.display = 'block';
					document.getElementById('captchaSection').style.display = 'block';
					await loadCaptchaImage();
				} else {
					showStatus('<span class="loading"></span> Waiting for captcha challenge...');
					setTimeout(checkStatus, 1000);
				}
			} catch (e) {
				setTimeout(checkStatus, 1000);
			}
		}
		checkStatus();
	</script>
</body>
</html>
